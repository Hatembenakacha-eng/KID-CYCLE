<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KidCycle – Filtres</title>
  <link rel="stylesheet" href="Shared.css" />
  <link rel="stylesheet" href="Filtres.css" />
</head>
<body>

<header class="topnav">
  <img class="logo" src="images/Kidcycle.png" />
  <div class="nav-links">
    <a href="detail produit.html">Acheter maintenant</a>
    <a href="#">Nouveautés</a>
    <a href="#">Vente</a>
    <a href="produits.html">Mes produits</a>
  </div>
  <div class="nav-right">
    <a href="panier.html" class="btn-cart active">
      <span>🛒</span> Mon Panier <span class="nav-badge">2</span>
    </a>
    <a href="Favoris.html" class="nav-icon" title="Mes favoris">♡</a>
    <a href="profil.html" class="nav-icon" title="Mon compte">👤</a>
    <div class="nav-avatar"><img src="images/logo.png" alt="Avatar" /></div>
    <div class="search-wrap">
      <input type="text" placeholder="Search" />
      <button><img class="search-icon"src="images/search.png" alt="Search icon" /></button>
    </div>
  </div>
</header>

<div class="page-wrap">


  <div class="filters-topbar">
    <span class="filters-label">Filters</span>
    <!-- "Tout effacer" = lien vers la page elle-même sans fragment, ce qui reset les :target -->
    <a href="filters.html" class="btn-clear">Tout effacer 🗑</a>
  </div>

  <div class="filters-layout">

    <!-- ══ PANNEAU FILTRES (checkbox hack pour collapsibles) ══ -->
    <aside class="filter-panel">

      <!-- CATÉGORIE -->
      <div class="filter-section">
        <input type="checkbox" id="toggle-cat" class="section-toggle" checked />
        <label for="toggle-cat" class="section-header">
          Catégorie <span class="chevron">▲</span>
        </label>
        <div class="section-body">
          <label class="filter-row"><input type="checkbox" checked /> Lorem <span class="count">(18)</span></label>
          <label class="filter-row"><input type="checkbox" checked /> Lorem <span class="count">(12)</span></label>
          <label class="filter-row"><input type="checkbox" /> Lorem <span class="count">(23)</span></label>
          <label class="filter-row"><input type="checkbox" /> Lorem <span class="count">(67)</span></label>
          <label class="filter-row"><input type="checkbox" /> Lorem <span class="count">(34)</span></label>
        </div>
      </div>

      <!-- GENRE -->
      <div class="filter-section">
        <input type="checkbox" id="toggle-genre" class="section-toggle" checked />
        <label for="toggle-genre" class="section-header">
          Genre <span class="chevron">▲</span>
        </label>
        <div class="section-body">
          <label class="filter-row"><input type="checkbox" /> Lorem</label>
          <label class="filter-row"><input type="checkbox" checked /> Lorem</label>
        </div>
      </div>

      <!-- TAILLE -->
      <div class="filter-section">
        <input type="checkbox" id="toggle-taille" class="section-toggle" checked />
        <label for="toggle-taille" class="section-header">
          Taille <span class="chevron">▲</span>
        </label>
        <div class="section-body">
          <label class="filter-row"><input type="checkbox" checked /> 0 - 1/2 <span class="count">(18)</span></label>
          <label class="filter-row"><input type="checkbox" checked /> 1/2 - 1 <span class="count">(12)</span></label>
          <label class="filter-row"><input type="checkbox" /> 1 - 2 <span class="count">(23)</span></label>
          <label class="filter-row"><input type="checkbox" /> 2 - 3 <span class="count">(67)</span></label>
          <label class="filter-row"><input type="checkbox" /> 3 - 4 <span class="count">(34)</span></label>
        </div>
      </div>

      <!-- ÉTAT -->
      <div class="filter-section no-border">
        <input type="checkbox" id="toggle-etat" class="section-toggle" checked />
        <label for="toggle-etat" class="section-header">
          État <span class="chevron">▲</span>
        </label>
        <div class="section-body">
          <label class="filter-row"><input type="checkbox" /> Lorem</label>
          <label class="filter-row"><input type="checkbox" checked /> Lorem</label>
        </div>
      </div>

    </aside>

    <!-- ══ ÉTAT VIDE ══ -->
    <div class="empty-state">
      <svg width="120" height="140" viewBox="0 0 120 140" fill="none">
        <path d="M30 50 Q20 50 18 65 L10 120 Q8 135 25 135 L95 135 Q112 135 110 120 L102 65 Q100 50 90 50 Z"
              stroke="#c4bede" stroke-width="3" fill="none"/>
        <path d="M42 50 Q42 20 60 20 Q78 20 78 50"
              stroke="#c4bede" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="48" cy="90" r="3.5" fill="#c4bede"/>
        <circle cx="72" cy="90" r="3.5" fill="#c4bede"/>
        <line x1="52" y1="107" x2="68" y2="107" stroke="#c4bede" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <p class="empty-text">Il n'y a actuellement aucun produit disponible ici.</p>
    </div>

  </div>
</div>

</body>
</html>
