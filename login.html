<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KidCycle - Connexion</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-page">
    <div class="background-image">
      <div class="form-card">
        <h1>Connexion</h1>
        <form>
          <div class="input-group">
            <input type="email" placeholder="Email" required />
          </div>
          <div class="input-group password-group">
            <input type="password" id="password" placeholder="Password" required />
            <button type="button" class="toggle-password" >
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="options-row">
            <label class="remember-me">
              <input type="checkbox" />
              <span class="checkmark"></span>
              Se souvenir de moi
            </label>
            <a href="" class="forgot-password">Mot de passe oublié</a>
          </div>
          <button type="submit" class="btn-submit">
            <a href="accueil.html"></a>
            Connecter <span class="arrow">&rarr;</span>
          </button>
          <p class="signup-link">
            Vous n'avez pas de compte ?<a href="formulaire.html">S'inscrire</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
